name: API tests

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  api-tests:
    runs-on: self-hosted

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Run tests
        env:
          BASE_URL: http://localhost:8080
        run: mvn clean test